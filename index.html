<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Genesis 1 Hebrew Study</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="reader" aria-label="Hebrew Bible reader">
        <header class="reader-header">
          <div>
            <p class="eyebrow">Genesis 1</p>
            <h1>Hebrew Word Study</h1>
          </div>
          <div class="chapter-tools" aria-label="Reader controls">
            <button class="icon-button" id="decreaseText" type="button" aria-label="Decrease Hebrew text size" title="Decrease text size">A-</button>
            <button class="icon-button" id="increaseText" type="button" aria-label="Increase Hebrew text size" title="Increase text size">A+</button>
            <button class="verse-audio-button" id="hearWholeVerseButton" type="button">
              Hear Whole Verse
            </button>
          </div>
        </header>

        <nav class="verse-tabs" id="verseTabs" aria-label="Choose verse"></nav>

        <article class="verse-card">
          <div class="verse-meta">
            <span id="verseReference">Genesis 1:1</span>
            <span id="wordCount">7 Hebrew words</span>
          </div>
          <div class="hebrew-line" id="hebrewLine" dir="rtl" lang="he" aria-label="Hebrew verse"></div>
          <p class="english-line" id="englishLine"></p>
        </article>

        <section class="notes-band" aria-label="Verse context">
          <h2>Verse Context</h2>
          <p id="verseContext"></p>
        </section>
      </section>

      <aside class="detail-panel" aria-label="Selected word details">
        <div class="detail-heading">
          <p class="eyebrow">Selected Word</p>
          <button class="icon-button" id="copyWord" type="button" aria-label="Copy selected word" title="Copy word">⧉</button>
        </div>
        <div class="selected-word" id="selectedHebrew" dir="rtl" lang="he"></div>
        <p class="transliteration" id="selectedTransliteration"></p>

        <dl class="word-facts">
          <div>
            <dt>English</dt>
            <dd id="selectedGloss"></dd>
          </div>
          <div>
            <dt>Pronunciation</dt>
            <dd id="selectedPronunciation"></dd>
          </div>
          <div>
            <dt>Root</dt>
            <dd id="selectedRoot"></dd>
          </div>
          <div>
            <dt>Strong's</dt>
            <dd id="selectedStrongs"></dd>
          </div>
          <div>
            <dt>Form</dt>
            <dd id="selectedForm"></dd>
          </div>
          <div>
            <dt>Grammar</dt>
            <dd id="selectedGrammar"></dd>
          </div>
        </dl>

        <button class="lexicon-button" id="blueLetterBibleButton" type="button">
          Open in Blue Letter Bible
        </button>
        <button class="lexicon-button secondary-action" id="googleTranslateButton" type="button">
          Hear in Google Translate
        </button>
        <p class="helper-note">Modern Hebrew audio helper</p>

        <section class="detail-section">
          <h2>Context</h2>
          <p id="selectedContext"></p>
        </section>

        <section class="detail-section">
          <h2>Study Prompt</h2>
          <p id="selectedPrompt"></p>
        </section>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
